name: CI / CD — Build, Test & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Readme.md'
      - 'last_deploy.txt'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────
  #  1. Install & Validate
  # ──────────────────────────────────────────
  install:
    name: 📦 Install & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate app starts
        run: |
          timeout 10 node app.js &
          sleep 3
          curl -f http://localhost:3000/latest-updates || exit 1
          curl -f http://localhost:3000/ || exit 1
          echo "✅ App starts successfully and serves both API and UI"
          kill %1 || true

  # ──────────────────────────────────────────
  #  2. Docker Build & Push
  # ──────────────────────────────────────────
  build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: install
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            dprakash0321/ttd_latest_updates:latest
            dprakash0321/ttd_latest_updates:${{ github.sha }}

  # ──────────────────────────────────────────
  #  3. Deploy to Render
  # ──────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Wait for deploy to stabilize
        run: |
          echo "⏳ Waiting 30s for Render deploy..."
          sleep 30

      - name: Verify deployment
        run: |
          echo "🔍 Checking production health..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ttd-latest-updates-latest.onrender.com/latest-updates)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Production API is healthy (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Production returned HTTP $HTTP_CODE — deploy may still be spinning up"
          fi

  # ──────────────────────────────────────────
  #  4. Log deploy timestamp
  # ──────────────────────────────────────────
  log_deploy:
    name: 📝 Log Deploy Time
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update last deploy time
        run: |
          echo "Last deploy (IST): $(TZ=Asia/Kolkata date)" >> last_deploy.txt

      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.USER_EMAIL }}"

      - name: Commit and push changes
        run: |
          git pull origin main --rebase=false
          git add last_deploy.txt
          git diff --cached --quiet || git commit -m "chore: update last deploy time [skip ci]"
          git push origin main
